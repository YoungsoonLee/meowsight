services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: meowsight
      POSTGRES_PASSWORD: meowsight
      POSTGRES_DB: meowsight
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meowsight"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    environment:
      CLICKHOUSE_DB: meowsight
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9001:9000"   # API
      - "9002:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  meowsight-api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: meowsight
      POSTGRES_PASSWORD: meowsight
      POSTGRES_DB: meowsight
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_DB: meowsight
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  meowsight-ingest:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.ingest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: meowsight
      POSTGRES_PASSWORD: meowsight
      POSTGRES_DB: meowsight
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DB: meowsight
      NATS_URL: nats://nats:4222
    depends_on:
      meowsight-api:
        condition: service_started
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy

  mock-openai:
    image: python:3.12-alpine
    command: ["python", "/app/mock_openai.py"]
    volumes:
      - ./deploy/mock:/app:ro
    ports:
      - "11500:11500"

  meowsight-proxy:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.proxy
    ports:
      - "8081:8081"
    environment:
      PROXY_PORT: 8081
      POSTGRES_HOST: postgres
      POSTGRES_USER: meowsight
      POSTGRES_PASSWORD: meowsight
      POSTGRES_DB: meowsight
      NATS_URL: nats://nats:4222
      OPENAI_BASE_URL: http://mock-openai:11500
    depends_on:
      meowsight-api:
        condition: service_started
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mock-openai:
        condition: service_started

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  nats_data:
  minio_data:
